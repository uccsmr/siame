<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agendamiento Medios Educativos</title>
  <link rel="stylesheet" href="style.css?v=20260723-HR03">
</head>
<body data-page="docente">
  <main class="wrap">
    <section class="hero">
      <img src="logo-ucc.png" alt="UCC" class="logo">
      <div>
        <h1>Agendamiento Medios Educativos - Campus Santa Marta</h1>
        <p>Alistamiento de Inicio de Clases 2620</p>
      </div>
    </section>

    <section class="card">
      <h2>🔎 Consulta de Profesor</h2>
      <p class="help">Ingrese su documento o correo institucional para cargar los planes de curso asignados.</p>
      <div id="msg" class="hidden"></div>
      <div class="row">
        <div class="field">
          <label>Documento o correo</label>
          <input id="txtConsulta" type="text" placeholder="Ej: 123456789 o correo@campusucc.edu.co" autocomplete="off">
        </div>
        <button id="btnCargarPlanes" class="btn-primary">Cargar planes asignados</button>
      </div>
    </section>

    <section id="resumenDocente" class="card hidden"></section>
    <section id="planesContainer" class="grid"></section>
    <section id="agendaBox" class="card scheduler hidden"></section>
  </main>
  <footer class="footer">Universidad Cooperativa de Colombia · Campus Santa Marta</footer>

<script src="config.js?v=20260723-HR03"></script>
<script src="app.js?v=20260723-HR03"></script>
</body>
</html>
